<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flex{
            display: flex;
        }
        .justify-center{
            justify-content: center;
        }
        .align-center{
            align-items: center;
        }
        .h-full{
            height: 100vh;
        }
        .w-full{
            width: 100vw;
        }
        .bg-red-500{
            background-color: rgb(167, 56, 56);
        }
        .bg-white{
            background-color: white;
        }
        .h-100{
            height: 100px;
        }
        .w-100{
            width: 100px;
        }
    </style>
</head>
<body>

    <div class="h-full w-full bg-red-500 flex justify-center align-center">
        <div class="h-100 w-100 bg-white"></div>
    </div>
    
</body>
</html>
